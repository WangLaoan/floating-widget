name: ETF Monitor

on:
  schedule:
    # A股+港股交易时段 每30分钟 (北京时间 9:30-16:00 = UTC 1:30-8:00)
    - cron: "*/30 1-8 * * 1-5"
    # 美股收盘后检查 (UTC 21:00)
    - cron: "0 21 * * 1-5"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        run: python scripts/monitor_pushplus.py

      - name: Commit state changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/monitor_state.json
          if git diff --staged --quiet; then
            echo "state unchanged"
          else
            git commit -m "update monitor state [skip ci]"
            git push
          fi
